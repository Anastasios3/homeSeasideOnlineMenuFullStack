      ],

        { "@type": "OpeningHoursSpecification", "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday"], "opens": "09:00", "closes": "00:00" },
        { "@type": "OpeningHoursSpecification", "dayOfWeek": ["Friday","Saturday"],                            "opens": "09:00", "closes": "02:00" },
        { "@type": "OpeningHoursSpecification", "dayOfWeek": "Sunday",                                          "opens": "10:00", "closes": "00:00" }

    <!-- Preload critical fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..900,0..100,0..1&family=Inter:wght@300;400;500;600;700&display=swap"
    />

    <!-- Pre-hydration theme — avoids FOUC. Reads localStorage override or
         falls back to schedule (mirrors src/config/schedule.ts). -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("homeseaside_theme_override");
          var theme;
          if (stored === "light" || stored === "dark") {
            theme = stored;
          } else {
            var h = new Date().getHours();
            theme = (h >= 19 || h < 6) ? "dark" : "light";
          }
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
